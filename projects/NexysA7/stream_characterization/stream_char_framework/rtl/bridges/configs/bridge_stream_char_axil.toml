#==============================================================================
# bridge_stream_char_axil.toml
#==============================================================================
# 1-master x 6-slave AXI4-Lite bridge for the stream_characterization harness.
#
# The single master is the host's UART -> AXIL bridge. The six slaves match
# the harness's existing decoded regions, with S5 reserved as the bridge port
# that flows-vivado-mcdma (and the future flows-stream-vivado-bridge) plug
# their DUT's AXIL config interface into.
#
# Address map (matches stream_char_harness's prior axil_decode_5s map plus
# the new s5 region):
#
#   stream_apb     0x0000_0000  4 KB    APB    STREAM config regs (auto-converted from AXIL)
#   harness_csr    0x0001_0000  256 B   AXIL   timer / response delay / kick / status
#   desc_ram       0x0002_0000  64 KB   AXIL   descriptor preload BRAM
#   stream_err     0x0003_0000  64 B    AXIL   small err FIFO read
#   debug_sram     0x0004_0000  256 KB  AXIL   monitor trace          (ends 0x7_FFFF)
#   dma_axil       0x0008_0000  4 KB    AXIL   DMA s_axi_lite (MCDMA / Vivado bridge)
#
# Generated outputs land in stream_char_framework/rtl/bridges/generated/
# bridge_stream_char_axil/.
#==============================================================================

[bridge]
name = "bridge_stream_char_axil"
description = "1xM AXIL bridge for stream_characterization harness (5 harness slaves + 1 DMA AXIL port)"

[bridge.clock]
name = "aclk"
frequency_mhz = 100

# ---- Master ----------------------------------------------------------------
[[bridge.masters]]
name        = "host"
prefix      = "host_axi_"
protocol    = "axil"
channels    = "rw"
# id_width=1 is a workaround for the generator emitting `[-1:0]` ranges
# when id_width=0. AXIL has no transaction IDs in its protocol; the host
# port ties the id signals to 0 — a degenerate 1-bit ID is harmless.
id_width    = 1
addr_width  = 32
data_width  = 32
user_width  = 0

# ---- Slaves ----------------------------------------------------------------
[[bridge.slaves]]
name        = "stream_apb"
prefix      = "stream_apb_"
protocol    = "apb"
channels    = "rw"
id_width    = 0
addr_width  = 32
data_width  = 32
user_width  = 0
base_addr   = "0x00000000"
addr_range  = "0x00001000"     # 4 KB

[[bridge.slaves]]
name        = "harness_csr"
prefix      = "harness_csr_axi_"
protocol    = "axil"
channels    = "rw"
id_width    = 0
addr_width  = 32
data_width  = 32
user_width  = 0
base_addr   = "0x00010000"
addr_range  = "0x00000100"     # 256 B

[[bridge.slaves]]
name        = "desc_ram"
prefix      = "desc_ram_axi_"
protocol    = "axil"
channels    = "rw"
id_width    = 0
addr_width  = 32
data_width  = 32
user_width  = 0
base_addr   = "0x00020000"
addr_range  = "0x00010000"     # 64 KB

[[bridge.slaves]]
name        = "stream_err"
prefix      = "stream_err_axi_"
protocol    = "axil"
channels    = "rw"
id_width    = 0
addr_width  = 32
data_width  = 32
user_width  = 0
base_addr   = "0x00030000"
addr_range  = "0x00000040"     # 64 B

[[bridge.slaves]]
name        = "debug_sram"
prefix      = "debug_sram_axi_"
protocol    = "axil"
channels    = "rw"
id_width    = 0
addr_width  = 32
data_width  = 32
user_width  = 0
base_addr   = "0x00040000"
addr_range  = "0x00040000"     # 256 KB

[[bridge.slaves]]
name        = "dma_axil"
prefix      = "dma_axil_"
protocol    = "axil"
channels    = "rw"
id_width    = 0
addr_width  = 32
data_width  = 32
user_width  = 0
base_addr   = "0x00080000"
addr_range  = "0x00001000"     # 4 KB (DMA s_axi_lite window)
