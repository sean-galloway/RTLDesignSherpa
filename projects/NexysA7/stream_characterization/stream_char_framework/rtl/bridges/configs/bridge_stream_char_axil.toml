#==============================================================================
# bridge_stream_char_axil.toml
#==============================================================================
# 1-master x 6-slave AXI4-Lite bridge for the stream_characterization harness.
#
# The single master is the host's UART -> AXIL bridge. The six slaves match
# the harness's existing decoded regions, with S5 reserved as the bridge port
# that flows-vivado-mcdma (and the future flows-stream-vivado-bridge) plug
# their DUT's AXIL config interface into.
#
# Address map. Every slave occupies a whole 4 KB page (enforced by
# the bridge generator's config validator: real bus agents must sit
# on 4K boundaries with 4K-multiple windows or MMU / linker / decode
# tooling breaks).
#
#   stream_apb     0x0000_0000  4 KB    APB    STREAM config regs (auto-converted from AXIL)
#   harness_csr    0x0001_0000  4 KB    AXIL   timer / response delay / kick / status
#   desc_ram       0x0002_0000  64 KB   AXIL   descriptor preload BRAM
#   stream_err     0x0003_0000  4 KB    AXIL   small err FIFO read
#   debug_sram     0x0004_0000  256 KB  AXIL   monitor trace          (ends 0x7_FFFF)
#   dma_axil       0x0008_0000  4 KB    AXIL   DMA s_axi_lite (MCDMA / Vivado bridge)
#
# Generated outputs land in stream_char_framework/rtl/bridges/generated/
# bridge_stream_char_axil/.
#==============================================================================

[bridge]
name = "bridge_stream_char_axil"
description = "1xM AXIL bridge for stream_characterization harness (5 harness slaves + 1 DMA AXIL port)"
# Non-monitored fan-out bridge only -- the stream_char harness already
# instantiates monbus_axil_group inside stream_top_ch8, so an extra
# monitor-wrapped variant of this AXIL bridge would just add area for
# no observability gain. Only the "no" variant is emitted.
variants = ["no"]

[bridge.clock]
name = "aclk"
frequency_mhz = 100

# ---- Master ----------------------------------------------------------------
[[bridge.masters]]
name        = "host"
# `host_axi_` matches the wiring in flows-stream-bridge/rtl/stream_char_harness.sv
# (the harness instantiates the bridge with `.host_axi_<sig>(...)` connections,
# carried over from the pre-Bug-C generator that hardcoded the `_axi_` infix).
prefix      = "host_axi_"
protocol    = "axil"
channels    = "rw"
# id_width=8 across the bridge so master-side and slave-side ID widths
# match end-to-end. Setting it to 0 hits two generator quirks (TASK-011
# in projects/components/bridge):
#   1. host port emits invalid `[-1:0]` SV ranges.
#   2. xbar's slave-side AXI4 carries IDs at the slave's id_width but
#      a width-mismatched master triggers WIDTHEXPAND fatals in the
#      generated connectivity test.
# AXIL has no transaction IDs in its protocol; the host port ties its
# 8 id bits to 0 at the wiring boundary.
id_width    = 4
addr_width  = 32
data_width  = 32
user_width  = 0

# ---- Master: stream_desc -------------------------------------------------
# STREAM's m_axi_desc — fetches descriptors from desc_ram. Native 256-bit
# AXI4 single-beat reads (the descriptor format is exactly 256 bits). The
# bridge handles width downsize 256 → 64 on the way into desc_ram and
# packs the response back to 256 on the return path.
[[bridge.masters]]
name        = "stream_desc"
prefix      = "stream_desc_"
protocol    = "axi4"
channels    = "r"
# id_width = 4 matches host and monbus_wr (mixed id_widths across
# masters break the xbar's struct-typed channels). STREAM's
# m_axi_desc is 8 bits at the SoC level; harness truncates the
# upper 4 bits at the wiring boundary.
id_width    = 4
addr_width  = 32
data_width  = 256
user_width  = 3

# ---- Master: monbus_wr ---------------------------------------------------
# Monbus_axil_group's m_axil_mon master — streams 64-bit MonBus packet
# beats into debug_sram. Native 64-bit AXIL writes. No width conversion
# needed at the slave (debug_sram is also 64-bit).
[[bridge.masters]]
name        = "monbus_wr"
prefix      = "monbus_wr_"
protocol    = "axil"
channels    = "w"
id_width    = 4
addr_width  = 32
data_width  = 64
user_width  = 0

# ---- Slaves ----------------------------------------------------------------
[[bridge.slaves]]
name        = "stream_apb"
prefix      = "stream_apb_"
protocol    = "apb"
channels    = "rw"
id_width    = 0       # APB has no IDs; validator forces this to 0
addr_width  = 32
data_width  = 32
user_width  = 0
base_addr   = "0x00000000"
addr_range  = "0x00001000"     # 4 KB

[[bridge.slaves]]
name        = "harness_csr"
prefix      = "harness_csr_axi_"
protocol    = "axil"
channels    = "rw"
id_width    = 4
addr_width  = 32
data_width  = 32
user_width  = 0
base_addr   = "0x00010000"
# Bumped from the legacy 256 B to a 4 KB page. Every agent on the
# bridge must occupy a whole 4K page (validator enforces this) -- the
# CSR block itself still uses only the first few bytes, but the
# decode window has to be page-granular.
addr_range  = "0x00001000"     # 4 KB

[[bridge.slaves]]
name        = "desc_ram"
prefix      = "desc_ram_axi_"
protocol    = "axil"
channels    = "rw"
id_width    = 4
addr_width  = 32
# Descriptor fetches are 256-bit end-to-end by design (one descriptor =
# one beat at the slave). The SRAM instance behind this slot is the
# same unified axil_sdpram_slave module used by debug_sram, but with
# DATA_WIDTH=256 here (debug_sram stays 64). Host's 32-bit writes go
# through the bridge's 32->256 upsize; STREAM's 256-bit reads pass
# through with no width conversion at all (the 256->64 downsize +
# axi4_to_axil4_rd path that landed here briefly wedged on the AR
# inside the converter — descriptor path can't tolerate extra
# converter stages).
data_width  = 256
user_width  = 0
base_addr   = "0x00020000"
addr_range  = "0x00010000"     # 64 KB

[[bridge.slaves]]
name        = "stream_err"
prefix      = "stream_err_axi_"
protocol    = "axil"
channels    = "rw"
id_width    = 4
addr_width  = 32
data_width  = 32
user_width  = 0
base_addr   = "0x00030000"
# Bumped from 64 B to a 4 KB page. The err FIFO only uses a few bytes
# but its decode window has to be page-granular like every other slave.
addr_range  = "0x00001000"     # 4 KB

[[bridge.slaves]]
name        = "debug_sram"
prefix      = "debug_sram_axi_"
protocol    = "axil"
channels    = "rw"
id_width    = 4
addr_width  = 32
# Widened to 64 alongside the SRAM rewrite. axil_sdpram_slave backs
# this slot; monbus's 64-bit AXIL master connects directly, host
# reads go through the bridge's 32->64 upsize.
data_width  = 64
user_width  = 0
base_addr   = "0x00040000"
addr_range  = "0x00040000"     # 256 KB

[[bridge.slaves]]
name        = "dma_axil"
# Drop the `_axi_` infix on this port — the slave name already carries the
# protocol tag (`axil`), so `dma_axil_axi_*` would be saying it twice. The
# harness wires the bridge as `.dma_axil_<sig>(...)` to match.
prefix      = "dma_axil_"
protocol    = "axil"
channels    = "rw"
id_width    = 4
addr_width  = 32
data_width  = 32
user_width  = 0
base_addr   = "0x00080000"
addr_range  = "0x00001000"     # 4 KB (DMA s_axi_lite window)

