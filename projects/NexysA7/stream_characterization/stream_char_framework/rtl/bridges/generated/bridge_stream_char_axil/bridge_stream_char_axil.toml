#==============================================================================
# bridge_stream_char_axil.toml
#==============================================================================
# 1-master x 6-slave AXI4-Lite bridge for the stream_characterization harness.
#
# The single master is the host's UART -> AXIL bridge. The six slaves match
# the harness's existing decoded regions, with S5 reserved as the bridge port
# that flows-vivado-mcdma (and the future flows-stream-vivado-bridge) plug
# their DUT's AXIL config interface into.
#
# Address map. Every slave occupies a whole 4 KB page (enforced by
# the bridge generator's config validator: real bus agents must sit
# on 4K boundaries with 4K-multiple windows or MMU / linker / decode
# tooling breaks).
#
#   stream_apb     0x0000_0000  4 KB    APB    STREAM config regs (auto-converted from AXIL)
#   harness_csr    0x0001_0000  4 KB    AXIL   timer / response delay / kick / status
#   desc_ram       0x0002_0000  64 KB   AXIL   descriptor preload BRAM
#   stream_err     0x0003_0000  4 KB    AXIL   small err FIFO read
#   debug_sram     0x0004_0000  256 KB  AXIL   monitor trace          (ends 0x7_FFFF)
#   dma_axil       0x0008_0000  4 KB    AXIL   DMA s_axi_lite (MCDMA / Vivado bridge)
#
# Generated outputs land in stream_char_framework/rtl/bridges/generated/
# bridge_stream_char_axil/.
#==============================================================================

[bridge]
name = "bridge_stream_char_axil"
description = "1xM AXIL bridge for stream_characterization harness (5 harness slaves + 1 DMA AXIL port)"
# Both variants emitted:
#   "no"  -- the production fan-out bridge with zero monitor area; this
#             is what stream_top_ch8 currently instantiates because
#             monbus_axil_group lives inside STREAM and the bridge
#             adapters add no extra observability for normal builds.
#   "mon" -- per-port axil4_*_mon wrappers on every adapter, used as a
#             SECOND packet source for the compression-dataset
#             collection (per-source isolation runs). Lets the harness
#             swap in the monitored bridge for traces that need to see
#             host-bus side traffic (separate from the desc-bus and
#             scheduler monitors already inside stream_top_ch8). Not
#             instantiated yet — adding to variants here lets the
#             generator emit it so the harness can opt in later
#             (per task #114 / per-source isolation prep).
variants = ["no", "mon"]
# mon_preset "all" gives every adapter port the full 6-cone reporter
# (error + timeout + compl + threshold + perf + debug). The compression
# agent's analysis needs every packet class available on every source;
# overrides to drop cones per-port can be added below if a specific
# port turns out to be too noisy.
mon_preset = "all"
# Task 90.4: opt into the PeakRDL regblock-backed cfg subsystem on the
# mon variant. Drops the 351 individual cfg_* input ports in favour of
# a single s_cfg_axil_* AXIL slave; the regblock fans out hwif_out
# fields to the per-port monitors and the monbus_axil_group cfg.
# Tied off in stream_char_harness for now until address-routing lands
# (the harness wires s_cfg_axil_aw/ar valid=0, ready=1 with reset
# defaults the regblock initialises every cfg field to).
use_cfg_regblock = true

[bridge.clock]
name = "aclk"
frequency_mhz = 100

# ---- Master ----------------------------------------------------------------
[[bridge.masters]]
name        = "host"
# `host_axi_` matches the wiring in flows-stream-bridge/rtl/stream_char_harness.sv
# (the harness instantiates the bridge with `.host_axi_<sig>(...)` connections,
# carried over from the pre-Bug-C generator that hardcoded the `_axi_` infix).
prefix      = "host_axi_"
protocol    = "axil"
channels    = "rw"
# id_width=8 across the bridge so master-side and slave-side ID widths
# match end-to-end with STREAM's native 8-bit AXI_ID_WIDTH. ASIC-style
# convention: every non-APB port uses the same 8-bit id field, so the
# bridge's xbar id-routing and STREAM's per-channel id-routing
# (CHANNEL_ID at low CHAN_WIDTH bits) never have to truncate or alias.
# AXIL has no transaction IDs in its protocol; the host port ties its
# 8 id bits to 0 at the wiring boundary.
id_width    = 8
addr_width  = 32
data_width  = 32
user_width  = 0

# ---- Master: stream_desc -------------------------------------------------
# STREAM's m_axi_desc — fetches descriptors from desc_ram. Native 256-bit
# AXI4 single-beat reads (the descriptor format is exactly 256 bits). The
# bridge handles width downsize 256 → 64 on the way into desc_ram and
# packs the response back to 256 on the return path.
[[bridge.masters]]
name        = "stream_desc"
prefix      = "stream_desc_"
protocol    = "axi4"
channels    = "r"
# id_width = 8 to match STREAM's native AXI_ID_WIDTH end-to-end. No
# more upper-bit truncation at the wiring boundary, and the bridge
# carries the full r_id back so per-channel routing in
# scheduler_group_array can never see an aliased id.
id_width    = 8
addr_width  = 32
data_width  = 256
user_width  = 3

# ---- Master: monbus_wr ---------------------------------------------------
# Monbus_axil_group's m_axil_mon master — streams 64-bit MonBus packet
# beats into debug_sram. Native 64-bit AXIL writes. No width conversion
# needed at the slave (debug_sram is also 64-bit).
[[bridge.masters]]
name        = "monbus_wr"
prefix      = "monbus_wr_"
protocol    = "axil"
channels    = "w"
id_width    = 8
addr_width  = 32
data_width  = 64
user_width  = 0

# ---- Slaves ----------------------------------------------------------------
[[bridge.slaves]]
name        = "stream_apb"
prefix      = "stream_apb_"
protocol    = "apb"
channels    = "rw"
id_width    = 0       # APB has no IDs; validator forces this to 0
addr_width  = 32
data_width  = 32
user_width  = 0
base_addr   = "0x00000000"
addr_range  = "0x00001000"     # 4 KB

[[bridge.slaves]]
name        = "harness_csr"
prefix      = "harness_csr_axi_"
protocol    = "axil"
channels    = "rw"
id_width    = 8
addr_width  = 32
data_width  = 32
user_width  = 0
base_addr   = "0x00010000"
# Bumped from the legacy 256 B to a 4 KB page. Every agent on the
# bridge must occupy a whole 4K page (validator enforces this) -- the
# CSR block itself still uses only the first few bytes, but the
# decode window has to be page-granular.
addr_range  = "0x00001000"     # 4 KB

[[bridge.slaves]]
name        = "desc_ram"
prefix      = "desc_ram_axi_"
protocol    = "axi4"
channels    = "rw"
id_width    = 8
addr_width  = 32
# Descriptor fetches are 256-bit end-to-end by design (one descriptor =
# one beat at the slave). Slave is now AXI4 256-bit (was AXIL): the
# bridge no longer inserts axi4_to_axil4_rd/wr converters on the
# stream_desc → desc_ram path. STREAM's m_axi_desc (AXI4 256) talks
# directly to desc_ram. The host (AXIL 32) write path picks up an
# axil_to_axi4_wide_align_wr at the bridge master adapter (same module
# as before; just now the bridge stops AT the wide AXI4 master-side
# instead of round-tripping through axi4→axil at the slave adapter).
# Behind the bridge desc_ram port: axi4_sdpram_slave at the harness.
data_width  = 256
user_width  = 0
base_addr   = "0x00020000"
addr_range  = "0x00010000"     # 64 KB

[[bridge.slaves]]
name        = "stream_err"
prefix      = "stream_err_axi_"
protocol    = "axil"
channels    = "rw"
id_width    = 8
addr_width  = 32
data_width  = 32
user_width  = 0
base_addr   = "0x00030000"
# Bumped from 64 B to a 4 KB page. The err FIFO only uses a few bytes
# but its decode window has to be page-granular like every other slave.
addr_range  = "0x00001000"     # 4 KB

[[bridge.slaves]]
name        = "debug_sram"
prefix      = "debug_sram_axi_"
protocol    = "axil"
channels    = "rw"
id_width    = 8
addr_width  = 32
# Widened to 64 alongside the SRAM rewrite. axil_sdpram_slave backs
# this slot; monbus's 64-bit AXIL master connects directly, host
# reads go through the bridge's 32->64 upsize.
data_width  = 64
user_width  = 0
base_addr   = "0x00040000"
addr_range  = "0x00040000"     # 256 KB

[[bridge.slaves]]
name        = "dma_axil"
# Drop the `_axi_` infix on this port — the slave name already carries the
# protocol tag (`axil`), so `dma_axil_axi_*` would be saying it twice. The
# harness wires the bridge as `.dma_axil_<sig>(...)` to match.
prefix      = "dma_axil_"
protocol    = "axil"
channels    = "rw"
id_width    = 8
addr_width  = 32
data_width  = 32
user_width  = 0
base_addr   = "0x00080000"
addr_range  = "0x00001000"     # 4 KB (DMA s_axi_lite window)

