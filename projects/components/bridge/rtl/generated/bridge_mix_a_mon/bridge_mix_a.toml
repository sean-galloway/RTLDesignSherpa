#==============================================================================
# bridge_mix_a.toml — mixed-protocol bridge, "error_only" preset (default)
#==============================================================================
#
# 2 masters (1 axi4 + 1 axil) → 3 slaves (1 axi4 + 1 axil + 1 apb).
# Default bridge-area-minimum monitor build: every adapter port stays at
# ENABLE_ERROR_LOGIC=1, everything else dropped at synthesis. Nothing on
# any port overrides the preset, so we exercise the "preset alone" path.
#
# Generated by hand for the post-f731f6e8 mon-preset / mon_add schema.
#==============================================================================

[bridge]
name = "bridge_mix_a"
description = "mixed axi4/axil masters → axi4/axil/apb slaves, mon_preset=error_only"
variants = ["no", "mon"]
# Default — explicit for clarity; could be omitted (defaults to error_only).
mon_preset = "error_only"

[bridge.clock]
name = "aclk"
frequency_mhz = 100

# ---------------------------------------------------------------- masters ---

# CPU read/write — full AXI4, default mon (error-only).
[[bridge.masters]]
name      = "cpu_axi4"
prefix    = "cpu_axi4_"
protocol  = "axi4"
channels  = "rw"
id_width  = 4
addr_width = 32
data_width = 64
user_width = 1

# Lightweight host — AXI-Lite.
[[bridge.masters]]
name      = "host_axil"
prefix    = "host_axil_"
protocol  = "axil"
channels  = "rw"
id_width  = 0
addr_width = 32
data_width = 32
user_width = 1

# ---------------------------------------------------------------- slaves ----

# DDR-like AXI4 slave.
[[bridge.slaves]]
name      = "ddr"
prefix    = "ddr_s_axi_"
protocol  = "axi4"
channels  = "rw"
id_width  = 4
addr_width = 32
data_width = 64
user_width = 1
base_addr  = "0x00000000"
addr_range = "0x40000000"  # 1 GB

# AXIL peripheral — config registers etc.
[[bridge.slaves]]
name      = "axil_periph"
prefix    = "axil_periph_"
protocol  = "axil"
channels  = "rw"
id_width  = 0
addr_width = 32
data_width = 32
user_width = 1
base_addr  = "0x40000000"
addr_range = "0x00010000"  # 64 KB

# APB peripheral — small slow IO block.
[[bridge.slaves]]
name      = "apb_periph"
prefix    = "apb_periph_"
protocol  = "apb"
channels  = "rw"
id_width  = 0
addr_width = 32
data_width = 32
user_width = 0
base_addr  = "0x40010000"
addr_range = "0x00010000"  # 64 KB
