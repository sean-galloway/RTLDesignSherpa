test_file: projects/components/memory-controllers/ddr2-lpddr2/dv/tests/fub/test_scheduler.py

parameters:
- name: WR_CAM_DEPTH
  default: 16
  description: Write CAM depth (number of slots)
- name: RD_CAM_DEPTH
  default: 16
  description: Read CAM depth (number of slots)
- name: NUM_RANKS
  default: 1
  description: Number of DRAM ranks
- name: NUM_BANKS
  default: 8
  description: Number of DRAM banks per rank
- name: ROW_WIDTH
  default: 14
  description: Row-address width
- name: COL_WIDTH
  default: 10
  description: Column-address width
- name: BURST_LEN_WIDTH
  default: 8
  description: Burst-length field width
- name: AXI_ID_WIDTH
  default: 4
  description: AXI ID width (for QoS / picker)
- name: PAGE_POLICY
  default: 1
  description: Page policy (0=OPEN, 1=CLOSE, 2=HAPPY_HYBRID)

