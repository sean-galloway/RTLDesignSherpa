implied_coverage:
  total_scenarios: 23
  scenario_tracked: 23
  implied_covered: 23
  implied_percentage: 100.0

notes: |
  Scheduler is the arbiter at the heart of the controller core. Per cycle:
    1. init_busy_i NOPs the bus while init_sequencer owns it
    2. mr_req_i / refresh_req_i / pdn_req_i preempt pending CAM slots
    3. Otherwise picks a wr/rd slot per QoS + age + page policy
    4. Walks S_IDLE → (S_NEED_PRE) → S_NEED_ACT → S_NEED_RDWR → S_DONE

  Key features verified:
    * 3 page policies (CLOSE / OPEN / HAPPY_HYBRID)
    * Auto-precharge selection (always-AP on CLOSE; predictor on HAPPY)
    * QoS-aware slot picker with lowest-index tie-break
    * S_DONE re-issue race guards (the canonical "registered strobe +
      consumer state lag" bug class — see test_patterns_strobe_race.md)
