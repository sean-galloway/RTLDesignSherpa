name: Coverage Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  COVERAGE: "1"
  SIM: verilator

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator python3 python3-pip

      - name: Install Python dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install --upgrade pip
            pip install -r requirements.txt
          fi
          pip install cocotb cocotb-test

      - name: Configure environment
        run: |
          REPO_ROOT="${GITHUB_WORKSPACE}"
          echo "REPO_ROOT=${REPO_ROOT}" >> "$GITHUB_ENV"

          # Build PYTHONPATH matching env_python
          PP="${REPO_ROOT}"
          PP="${PP}:${REPO_ROOT}/bin"
          PP="${PP}:${REPO_ROOT}/bin/rtl_generators"
          PP="${PP}:${REPO_ROOT}/bin/val_project"
          PP="${PP}:${REPO_ROOT}/bin/vcd2wavedrom2"
          PP="${PP}:${REPO_ROOT}/bin/rtl_generators/axi"
          PP="${PP}:${REPO_ROOT}/projects/components/apb_xbar/dv"
          PP="${PP}:${REPO_ROOT}/projects/components/bch/dv"
          PP="${PP}:${REPO_ROOT}/projects/components/bridge/dv"
          PP="${PP}:${REPO_ROOT}/projects/components/converters/dv"
          PP="${PP}:${REPO_ROOT}/projects/components/delta/dv"
          PP="${PP}:${REPO_ROOT}/projects/components/misc/dv"
          PP="${PP}:${REPO_ROOT}/projects/components/rapids/dv"
          PP="${PP}:${REPO_ROOT}/projects/components/retro_legacy_blocks/dv"
          PP="${PP}:${REPO_ROOT}/projects/components/stream/dv"
          echo "PYTHONPATH=${PP}" >> "$GITHUB_ENV"

          # Add repo bin directories to PATH
          echo "${REPO_ROOT}/bin" >> "$GITHUB_PATH"
          echo "${REPO_ROOT}/bin/vcd2wavedrom2" >> "$GITHUB_PATH"
          echo "${REPO_ROOT}/bin/rtl_generators/axi" >> "$GITHUB_PATH"

      - name: Run STREAM coverage
        continue-on-error: true
        run: make -C projects/components/stream/dv/tests fresh-coverage || true

      - name: Run RAPIDS coverage
        continue-on-error: true
        run: make -C projects/components/rapids/dv/tests coverage-full-report || true

      - name: Run Bridge coverage
        continue-on-error: true
        run: make -C projects/components/bridge/dv/tests fresh-coverage || true

      - name: Run Converters coverage
        continue-on-error: true
        run: make -C projects/components/converters/dv/tests fresh-coverage || true

      - name: Run formal verification (building blocks)
        continue-on-error: true
        run: make formal-common || true

      - name: Generate unified coverage report
        run: |
          python3 bin/cov_utils/unified_coverage_report.py \
            --output coverage_report.md \
            --json coverage_report.json

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage_report.md
            coverage_report.json

      - name: Check coverage thresholds
        run: |
          if [ ! -f coverage_report.json ]; then
            echo "ERROR: coverage_report.json not found"
            exit 1
          fi

          OVERALL_PASS=$(python3 -c "
          import json, sys
          with open('coverage_report.json') as f:
              data = json.load(f)
          passed = data.get('overall_pass', False)
          print('true' if passed else 'false')
          sys.exit(0 if passed else 1)
          ")

          if [ "$?" -ne 0 ]; then
            echo "COVERAGE GATE FAILED: one or more components below threshold"
            echo "See coverage_report.md artifact for details"
            exit 1
          fi

          echo "COVERAGE GATE PASSED: all components meet thresholds"

      - name: Post coverage summary to PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f coverage_report.md ]; then
            echo "No coverage report to post"
            exit 0
          fi

          PR_NUMBER=${{ github.event.pull_request.number }}

          # Build the comment body with a marker for idempotent updates
          MARKER="<!-- coverage-gate-report -->"
          BODY="${MARKER}
          ## Coverage Report

          $(cat coverage_report.md)"

          # Delete any previous coverage comment to avoid clutter
          EXISTING_COMMENT_ID=$(gh api \
            "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
            2>/dev/null | head -1)

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            gh api \
              --method DELETE \
              "repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT_ID}" \
              2>/dev/null || true
          fi

          # Post the new comment
          gh pr comment "${PR_NUMBER}" --body "${BODY}"
